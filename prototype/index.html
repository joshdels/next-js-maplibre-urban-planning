<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clup Map</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@5.16.0/dist/maplibre-gl.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/maplibre-gl@5.16.0/dist/maplibre-gl.min.css"
      rel="stylesheet"
    />

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body class="h-full flex flex-col bg-base">
    <header
      class="p-5 bg-base-100 font-black uppercase tracking-widest text-2xl"
    >
      Comprehensive Land Use Planning
    </header>

    <main class="grid grid-cols-12 h-full">
      <section
        class="col-span-5 sm:col-span-3 bg-base-300 p-5 flex flex-col h-full"
      >
        <h3 class="text-md sm:text-xl font-bold uppercase tracking-widest mb-4">Layers</h3>
        <div id="layers" class="flex-1 overflow-auto text-sm sm:text-lg mb-4">
          <!-- Checkboxes/layers go here -->
        </div>
        <button class="btn btn-neutral mt-auto">Generate Report</button>
      </section>

      <section id="map" class="col-span-7 sm:col-span-9 bg-neutral h-full">
        Map
      </section>
    </main>
  </body>
  <script src="map.js"></script>
</html>
