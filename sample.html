<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLUP | Urban Intelligence Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@5.16.0/dist/maplibre-gl.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/maplibre-gl@5.16.0/dist/maplibre-gl.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="h-screen overflow-hidden flex flex-col">
    <header
      class="navbar bg-base-300 border-b border-white/5 px-6 min-h-[64px]"
    >
      <div class="flex-1">
        <div class="flex flex-col">
          <span
            class="text-xs font-bold tracking-[0.2em] text-primary uppercase"
            >City Analytics</span
          >
          <h1 class="text-xl font-extrabold tracking-tight">
            CLUP <span class="font-light opacity-50">v2.0</span>
          </h1>
        </div>
      </div>
      <div class="flex-none gap-2">
        <button class="btn btn-ghost btn-circle">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
            />
          </svg>
        </button>
      </div>
    </header>

    <main class="flex-1 relative flex">
        <div class="p-6 space-y-8 overflow-y-auto">
          <section>
            <h3 class="text-xs font-bold uppercase tracking-widest mb-4">
              Layers
            </h3>
            <div class="space-y-2">
              <div
                class="form-control bg-base-300 p-3 rounded-lg border border-white/5"
              >
                <label class="label cursor-pointer p-0">
                  <span class="label-text font-semibold"
                    >Residential Zoning</span
                  >
                  <input
                    type="checkbox"
                    checked="checked"
                    class="checkbox checkbox-primary checkbox-sm"
                  />
                </label>
              </div>
              <div
                class="form-control bg-base-300 p-3 rounded-lg border border-white/5"
              >
                <label class="label cursor-pointer p-0">
                  <span class="label-text font-semibold">Commercial Core</span>
                  <input
                    type="checkbox"
                    class="checkbox checkbox-accent checkbox-sm"
                  />
                </label>
              </div>
              <div
                class="form-control bg-base-300 p-3 rounded-lg border border-white/5"
              >
                <label class="label cursor-pointer p-0">
                  <span class="label-text font-semibold">Green Belts</span>
                  <input
                    type="checkbox"
                    class="checkbox checkbox-secondary checkbox-sm"
                  />
                </label>
              </div>
            </div>
          </section>
        </div>

        <div class="p-4 mt-auto border-t border-white/5 bg-base-300/50">
          <button class="btn btn-primary btn-block btn-sm">
            Generate Report
          </button>
        </div>

      <div id="map" class="flex-1 relative"></div>
    </main>

    <script>
      var map = new maplibregl.Map({
        container: "map",
        style:
          "https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
        center: [-74.006, 40.7128],
        zoom: 12,
      });
    </script>
  </body>
</html>
